<!DOCTYPE html>
<html lang="pt-AO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | Mercado de Angola</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="pagina-login">

    <div class="container-login">
        <div class="lado-esquerdo">
            <div class="conteudo-lado">
                <h1>🌍 Mercado de Angola</h1>
                <h2>O mercado certo para negociar</h2>
                <p>Com segurança, confiança e facilidade. Junte-se a milhares de angolanos que já compram e vendem aqui.</p>
                <div class="beneficios">
                    <div><i class="fas fa-check-circle"></i> 100% Gratuito</div>
                    <div><i class="fas fa-check-circle"></i> Seguro e Verificado</div>
                    <div><i class="fas fa-check-circle"></i> Para todo o país</div>
                </div>
            </div>
        </div>

        <div class="lado-direito">
            <div class="caixa-login">
                <h3>Acessar Conta</h3>
                
                <form class="formulario-login" id="formLogin">
                    <div class="campo">
                        <label>Número de Telefone ou E-mail</label>
                        <input type="text" id="usuario" required placeholder="Ex: 923456789 ou seu@email.com">
                    </div>

                    <div class="campo">
                        <label>Senha</label>
                        <input type="password" id="senha" required placeholder="••••••••">
                        <a href="recuperar-senha.html" class="esqueci-senha">Esqueceu a senha?</a>
                    </div>

                    <button type="submit" class="btn-principal btn-grande">Entrar</button>
                </form>

                <div class="separador"><span>ou</span></div>

                <div class="criar-conta">
                    <p>Ainda não tem conta?</p>
                    <a href="cadastro.html" class="btn-segundario btn-grande">Criar Conta Gratuita</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
