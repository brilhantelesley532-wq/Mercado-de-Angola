<!DOCTYPE html>
<html lang="pt-AO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | Mercado de Angola</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container-login">
        <div class="caixa-login">
            <h2>Bem-vindo de Volta</h2>
            <p>Inicie sessão para continuar</p>

            <form>
                <div class="form-grupo">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" placeholder="Ex: 933000000" required>
                </div>

                <div class="form-grupo">
                    <label for="senha">Palavra-passe</label>
                    <input type="password" id="senha" placeholder="A sua senha" required>
                </div>

                <!-- ✅ BOTÃO COM A FUNÇÃO DE LOGIN JÁ COLOCADA -->
                <button type="button" onclick="fazerLogin()" class="btn-principal btn-grande">Entrar</button>
            </form>

            <div class="separador"><span>ou</span></div>

            <div class="criar-conta">
                <p>Ainda não tem conta?</p>
                <a href="cadastro.html" class="btn-segundario btn-grande">Criar Conta Gratuita</a>
            </div>
        </div>
    </div>

    <!-- SEUS OUTROS SCRIPTS -->
    <script src="js/script.js"></script>

    <!-- ✅ LIGAÇÃO COM O BANCO DE DADOS (SUPABASE) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>

    <!-- ✅ CÓDIGO DO SISTEMA DE LOGIN -->
    <script>
        async function fazerLogin() {
            // Pegar os dados que o utilizador escreveu
            let telefone = document.getElementById('telefone').value;
            let senha = document.getElementById('senha').value;

            try {
                // Procurar no banco de dados
                const { data: utilizador, error } = await supabase
                    .from('utilizadores')
                    .select('*')
                    .eq('telefone', telefone)
                    .eq('palavra_passe', senha)
                    .single();

                if (error) {
                    alert("❌ Telefone ou senha incorretos! Tente novamente.");
                    return;
                }

                // ✅ Se deu tudo certo, guardar a sessão
                localStorage.setItem('utilizadorLogado', JSON.stringify(utilizador));
                alert(`✅ Bem-vindo de volta, ${utilizador.nome}!`);

                // 🚀 Redirecionar para a página certa
                if (utilizador.nivel_acesso === 'admin') {
                    window.location.href = "admin.html";
                } else if (utilizador.nivel_acesso === 'moderador') {
                    window.location.href = "moderador.html";
                } else {
                    window.location.href = "index.html";
                }

            } catch (erro) {
                alert("⚠️ Erro ao conectar: " + erro.message);
            }
        }
    </script>

</body>
</html>
