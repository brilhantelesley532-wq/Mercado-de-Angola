<!DOCTYPE html>
<html lang="pt-AO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | Mercado de Angola</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container-login">
        <div class="caixa-login">
            <h2>Criar Nova Conta</h2>
            <p>É rápido e seguro</p>

            <form>
                <div class="form-grupo">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Ex: João Manuel" required>
                </div>

                <div class="form-grupo">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" placeholder="Ex: 933000000" required>
                </div>

                <div class="form-grupo">
                    <label for="email">E-mail (Opcional)</label>
                    <input type="email" id="email" placeholder="seuemail@exemplo.com">
                </div>

                <div class="form-grupo">
                    <label for="cidade">Cidade</label>
                    <select id="cidade" required>
                        <option value="">Escolha a sua cidade</option>
                        <option value="Luanda">Luanda</option>
                        <option value="Benguela">Benguela</option>
                        <option value="Huambo">Huambo</option>
                        <option value="Lubango">Lubango</option>
                    </select>
                </div>

                <div class="form-grupo">
                    <label for="senha">Palavra-passe</label>
                    <input type="password" id="senha" placeholder="Crie uma senha forte" required>
                </div>

                <!-- ✅ BOTÃO COM A FUNÇÃO DE CADASTRAR -->
                <button type="button" onclick="fazerCadastro()" class="btn-principal btn-grande">Criar Conta</button>
            </form>

            <div class="criar-conta">
                <p>Já tem uma conta?</p>
                <a href="login.html" class="btn-segundario btn-grande">Entrar Aqui</a>
            </div>
        </div>
    </div>

    <!-- Conexão com o Banco -->
    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>

    <!-- ✅ CÓDIGO DE CADASTRO -->
    <script>
        async function fazerCadastro() {
            // Pegar todos os dados do formulário
            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const email = document.getElementById('email').value;
            const cidade = document.getElementById('cidade').value;
            const senha = document.getElementById('senha').value;

            // Validação simples
            if (nome.length < 3 || telefone.length < 9 || senha.length < 6) {
                alert("❌ Preencha todos os campos corretamente!");
                return;
            }

            try {
                // 📤 ENVIAR DADOS PARA O BANCO
                const { data, error } = await supabase
                    .from('utilizadores')
                    .insert([
                        { 
                            nome: nome, 
                            telefone: telefone, 
                            email: email, 
                            cidade: cidade, 
                            palavra_passe: senha 
                        }
                    ]);

                if (error) {
                    if (error.message.includes('duplicate key')) {
                        alert("⚠️ Este número de telefone já está cadastrado!");
                    } else {
                        alert("❌ Erro: " + error.message);
                    }
                    return;
                }

                // ✅ SUCESSO
                alert("🎉 Conta criada com sucesso! Agora você pode fazer login.");
                window.location.href = "login.html";

            } catch (erro) {
                alert("⚠️ Erro de conexão: " + erro.message);
            }
        }
    </script>

</body>
</html>
